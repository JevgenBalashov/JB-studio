<section class="hero" id="hero">
  <span class="glow glow--blue hero__glow hero__glow--1"></span>
  <span class="glow glow--purple hero__glow hero__glow--2"></span>

  <div class="hero__container">
    <div class="hero__content">
      <span class="eyebrow" data-reveal data-i18n="hero.eyebrow">Freelance Web Studio</span>
      <h1 class="hero__title" data-reveal data-reveal-delay="1">
        <span data-i18n="hero.title">I build modern high-converting websites</span>
      </h1>
      <p class="hero__subtitle" data-reveal data-reveal-delay="2" data-i18n="hero.subtitle">
        Landing pages, online stores and web apps designed to turn visitors into clients.
        Clean code, premium design, fast delivery.
      </p>
      <div class="hero__actions" data-reveal data-reveal-delay="3">
        <a href="#contact" class="btn btn--primary" data-i18n="hero.ctaPrimary">Get a website</a>
        <a href="#contact" class="btn btn--ghost" data-i18n="hero.ctaSecondary">Contact me</a>
      </div>

      <ul class="hero__stats" data-reveal data-reveal-delay="4">
        <li class="hero__stat">
          <span class="hero__stat-value">50+</span>
          <span class="hero__stat-label" data-i18n="hero.stat1">Projects shipped</span>
        </li>
        <li class="hero__stat">
          <span class="hero__stat-value">5y</span>
          <span class="hero__stat-label" data-i18n="hero.stat2">Experience</span>
        </li>
        <li class="hero__stat">
          <span class="hero__stat-value">100%</span>
          <span class="hero__stat-label" data-i18n="hero.stat3">Responsive</span>
        </li>
      </ul>
    </div>
  </div>
</section>
