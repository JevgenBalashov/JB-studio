<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary Meta -->
  <title>@@title</title>
  <meta name="description" content="@@description">
  <meta name="keywords" content="web development, landing pages, e-commerce, web apps, UI/UX design, freelance web developer">
  <meta name="author" content="JB Studio">
  <meta name="theme-color" content="#0b0b0f">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="apple-touch-icon" href="images/favicon.svg">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="@@title">
  <meta property="og:description" content="@@description">
  <meta property="og:site_name" content="JB Studio">
  <meta property="og:image" content="images/og-cover.jpg">
  <meta property="og:locale" content="en_US">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="@@title">
  <meta name="twitter:description" content="@@description">
  <meta name="twitter:image" content="images/og-cover.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="css/style.min.css">
</head>
